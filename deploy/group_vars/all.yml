obsidia_app_name: obsidia-server-sync
obsidia_service_name: obsidia-server-sync
obsidia_app_user: obsidia-sync
obsidia_app_group: obsidia-sync
obsidia_app_root: /opt/obsidia-server-sync
obsidia_app_dir: "{{ obsidia_app_root }}/app"
obsidia_venv_dir: "{{ obsidia_app_root }}/venv"
obsidia_env_file: /etc/obsidia-server-sync.env
obsidia_sync_dir: /var/lib/obsidia-server-sync/data
obsidia_bind_host: 127.0.0.1
obsidia_bind_port: 8000
obsidia_nginx_site_name: obsidia-server-sync
obsidia_disable_default_site: true
obsidia_enable_http_api: false
obsidia_event_retention_ms: 2592000000
obsidia_compaction_interval_ms: 3600000
obsidia_api_key: "__SET_ME__"
